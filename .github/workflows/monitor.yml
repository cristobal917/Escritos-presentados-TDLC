name: Monitor TDLC

on:
  schedule:
    - cron: '0,20,40 12-23 * * 1-5'
  workflow_dispatch:

jobs:
  revisar:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # necesario para hacer commit del estado

    steps:
      - name: Descargar código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium
          sudo apt-get install -y \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2

      - name: Ejecutar bot
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          EMAIL_TO_DEFAULT: ${{ secrets.EMAIL_TO_DEFAULT }}
          EMAIL_TO_42572: ${{ secrets.EMAIL_TO_42572 }}
          EMAIL_TO_42509: ${{ secrets.EMAIL_TO_42509 }}
        run: python monitor_causas.py

      - name: Guardar estado en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add estado_escritos.json
          git diff --staged --quiet || git commit -m "bot: actualiza estado escritos [skip ci]"
          git push
