name: Monitor TDLC

on:
  schedule:
    - cron: '0,20,40 12-23 * * 1-5'
  workflow_dispatch:

jobs:
  revisar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Restaurar estado previo
        uses: actions/cache@v4
        with:
          path: estado_escritos.json
          key: estado-escritos-${{ runner.os }}
          restore-keys: estado-escritos-

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium
          sudo apt-get install -y \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2

      - name: Ejecutar bot
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          EMAIL_TO_DEFAULT: ${{ secrets.EMAIL_TO_DEFAULT }}
          EMAIL_TO_42572: ${{ secrets.EMAIL_TO_42572 }}
          EMAIL_TO_42509: ${{ secrets.EMAIL_TO_42509 }}
        run: python monitor_causas.py

      - name: Guardar estado actualizado
        uses: actions/cache/save@v4
        if: always()
        with:
          path: estado_escritos.json
          key: estado-escritos-${{ runner.os }}-${{ github.run_id }}
