name: Monitor TDLC

on:
  schedule:
    - cron: '0,20,40 12-23 * * 1-5'
  workflow_dispatch:

jobs:
  revisar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Restaurar estado previo
        uses: actions/cache@v4
        with:
          path: estado_escritos.json
          key: estado-escritos-${{ runner.os }}
          restore-keys: estado-escritos-

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Ejecutar bot
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          EMAIL_TO_DEFAULT: ${{ secrets.EMAIL_TO_DEFAULT }}
          # ── Un secret por cada causa que tenga lista propia ──
          # El nombre siempre es EMAIL_TO_ seguido del idCausa
          EMAIL_TO_42572: ${{ secrets.EMAIL_TO_42572 }}
          EMAIL_TO_42509: ${{ secrets.EMAIL_TO_42509 }}
          # Si una causa no aparece aquí, usará EMAIL_TO_DEFAULT
        run: python monitor_causas.py

      - name: Guardar estado actualizado
        uses: actions/cache/save@v4
        if: always()
        with:
          path: estado_escritos.json
          key: estado-escritos-${{ runner.os }}-${{ github.run_id }}
